# =============================================================================
# Flamingo Healthcare Platform — Nginx Configuration
# File: /etc/nginx/sites-available/flamingo
#
# Architecture:
#   :80  → React SPA (static files from /var/www/flamingo/frontend)
#   /api/*   → FastAPI :8000
#   /health  → FastAPI :8000
#   /hooks/* → flamingo-outbound :3000 (MocDoc webhooks)
#
# To install:
#   cp nginx.conf /etc/nginx/sites-available/flamingo
#   ln -s /etc/nginx/sites-available/flamingo /etc/nginx/sites-enabled/flamingo
#   rm /etc/nginx/sites-enabled/default
#   nginx -t && systemctl reload nginx
#
# For SSL (after deploy):
#   certbot --nginx -d your-domain.com
# =============================================================================

# Upstream definitions (makes it easy to change ports later)
upstream flamingo_api {
    server 127.0.0.1:8000;
    keepalive 4;
}

upstream flamingo_outbound {
    server 127.0.0.1:3000;
    keepalive 2;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;   # Replace _ with your domain e.g. flamingo.yourhospital.com

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options  "nosniff"                         always;
    add_header X-XSS-Protection        "1; mode=block"                   always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log  /var/log/nginx/flamingo.access.log;
    error_log   /var/log/nginx/flamingo.error.log warn;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # ── React SPA — serve from built dist/ ───────────────────────────────────
    root  /var/www/flamingo/frontend;
    index index.html;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── FastAPI dashboard API ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass          http://flamingo_api;
        proxy_http_version  1.1;
        proxy_set_header    Connection        "";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_connect_timeout 10s;
        proxy_send_timeout  30s;

        # Don't cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # FastAPI health + docs
    location ~ ^/(health|docs|redoc|openapi\.json)$ {
        proxy_pass          http://flamingo_api;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # ── flamingo-outbound — MocDoc webhooks ───────────────────────────────────
    # MocDoc posts to: https://your-domain.com/hooks/mocdoc
    # PBX  posts to:   https://your-domain.com/hooks/dialer/call
    location /hooks/ {
        proxy_pass          http://flamingo_outbound;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  10s;
        proxy_connect_timeout 5s;

        # Webhooks must respond quickly — no buffering
        proxy_buffering     off;
        proxy_request_buffering off;
    }

    # ── Block sensitive files ─────────────────────────────────────────────────
    location ~ /\.(env|git|htaccess|DS_Store) {
        deny all;
        return 404;
    }

    location ~ \.(py|ts|tsx|jsx|json)$ {
        deny all;
        return 404;
    }

    # ── React SPA — all other routes → index.html ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# =============================================================================
# HTTPS — certbot will auto-add this block when you run:
#   certbot --nginx -d your-domain.com
# =============================================================================
